# Full 3-OS R CMD check triggered on ci/windows-debug or manually on any branch.
# Windows runs first; macOS and Ubuntu start only after Windows passes.
# Remove the push trigger (or merge to feature/v6.5.0-sync) once the fix is verified.
on:
  workflow_dispatch:
  push:
    branches:
      - ci/windows-debug

name: R CMD check (Windows + macOS + Ubuntu)

permissions: read-all

jobs:
  R-CMD-check-windows:
    runs-on: windows-latest
    name: windows-latest (release)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          error-on: '"warning"'

      - name: Upload Rcheck tests (full testthat output) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rcheck-tests-windows
          if-no-files-found: ignore
          path: |
            **/*.Rcheck/tests/

  R-CMD-check-unix:
    needs: R-CMD-check-windows
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (release)

    strategy:
      fail-fast: true
      matrix:
        config:
          - {os: macos-latest}
          - {os: ubuntu-latest}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          error-on: '"warning"'

      - name: Upload Rcheck tests (full testthat output) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rcheck-tests-${{ matrix.config.os }}
          if-no-files-found: ignore
          path: |
            **/*.Rcheck/tests/
