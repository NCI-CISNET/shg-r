name: Python pytest (R-backed)

on:
  pull_request:
    branches:
      - main
      - master
      - 'v*-rc'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: pytest-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        run: Rscript -e 'install.packages(c("jsonlite", "pkgload"), repos = "https://cloud.r-project.org")'

      - name: Install SmokingHistoryGenerator
        run: R CMD INSTALL --preclean .

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/pytests/requirements-test.txt

      - name: Install Python test dependencies
        run: pip install -r tests/pytests/requirements-test.txt

      - name: Verify NHIS pytest testdata
        run: test -f tests/testdata/2018/csv-complete/initiation.csv

      - name: Run pytest (fast suite)
        env:
          SHG_R_ROOT: ${{ github.workspace }}
        working-directory: tests/pytests
        run: pytest
