# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Windows, macOS, and Ubuntu jobs run in parallel after checkout ref resolution.
# Windows: windows-latest + R-release (existing) and windows-2022 + R-devel (CRAN r-devel-windows-x86_64).
# CRAN-like checks use --as-cran with --no-manual (no PDF manual / no TinyTeX); the draft release
# workflow uses the same check/build flags — see release-draft-on-tag.yaml.
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  workflow_dispatch:
    branches:
      - '**'
    inputs:
      ref:
        description: "Git ref to checkout (branch, tag e.g. v1.2.3, or SHA). Leave empty to use the branch you selected in 'Use workflow from'."
        required: false
        type: string
        default: ""
  push:
    branches:
      - main
      - master
      - 'v*-rc'
      - ci/windows-debug
  pull_request:
    branches:
      - main
      - master
      - 'v*-rc'

name: R CMD check (all OS)
run-name: R CMD check (all OS) — ${{ inputs.ref || github.ref_name }}

permissions:
  contents: read
  actions: write

jobs:
  R-CMD-check-windows:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.label }}${{ inputs.ref && format(' [{0}]', inputs.ref) || '' }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - os: windows-latest
            r: release
            label: windows-latest (R-release)
            crlf_stress: false
            artifact_suffix: windows-release
          - os: windows-2022
            r: devel
            label: windows-2022 (R-devel)
            crlf_stress: true
            artifact_suffix: windows-cran-devel

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - id: pick_checkout_ref
        shell: bash
        env:
          INPUT_REF: ${{ inputs.ref }}
          FALLBACK_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_REF}" ]]; then
            out="${INPUT_REF}"
          else
            out="${FALLBACK_REF}"
          fi
          echo "Resolved checkout ref: ${out}"
          echo "ref=${out}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pick_checkout_ref.outputs.ref }}

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: CRLF stress for bundled CSVs (Windows)
        if: matrix.config.crlf_stress
        shell: pwsh
        run: |
          $paths = @('inst/extdata', 'tests/testdata')
          foreach ($root in $paths) {
            if (-not (Test-Path $root)) { continue }
            Get-ChildItem -Path $root -Recurse -Filter '*.csv' | ForEach-Object {
              $text = [IO.File]::ReadAllText($_.FullName)
              $text = $text -replace "`r`n", "`n"
              $text = $text -replace "`n", "`r`n"
              [IO.File]::WriteAllText($_.FullName, $text)
            }
          }

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          error-on: '"warning"'

      - name: Upload Rcheck tests (full testthat output) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rcheck-tests-${{ matrix.config.artifact_suffix }}
          if-no-files-found: ignore
          path: |
            **/*.Rcheck/tests/

  R-CMD-check-unix:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }}${{ inputs.ref && format(' [{0}]', inputs.ref) || format(' ({0})', matrix.config.r) }}

    strategy:
      fail-fast: true
      matrix:
        config:
          - {os: macos-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - id: pick_checkout_ref
        shell: bash
        env:
          INPUT_REF: ${{ inputs.ref }}
          FALLBACK_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_REF}" ]]; then
            out="${INPUT_REF}"
          else
            out="${FALLBACK_REF}"
          fi
          echo "Resolved checkout ref: ${out}"
          echo "ref=${out}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pick_checkout_ref.outputs.ref }}

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          error-on: '"warning"'

      - name: Upload Rcheck tests (full testthat output) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rcheck-tests-${{ matrix.config.os }}
          if-no-files-found: ignore
          path: |
            **/*.Rcheck/tests/
