# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Windows runs first; macOS/Ubuntu start only after Windows passes (saves time when Windows fails).
# Core check steps live in .github/actions/r-cmd-check-shg-r (also used by release-draft-on-tag).
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  workflow_dispatch:
    branches:
      - '**'
    inputs:
      ref:
        description: "Git ref to checkout (branch, tag e.g. v1.2.3, or SHA). Leave empty to use the branch you selected in 'Use workflow from'."
        required: false
        type: string
        default: ""
  push:
    branches:
      - ci/windows-debug

name: R CMD check (all OS)
run-name: R CMD check (all OS) — ${{ inputs.ref || github.ref_name }}

permissions:
  contents: read
  actions: write

jobs:
  R-CMD-check-windows:
    runs-on: windows-latest
    name: windows-latest${{ inputs.ref && format(' [{0}]', inputs.ref) || ' (release)' }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - id: pick_checkout_ref
        shell: bash
        env:
          INPUT_REF: ${{ inputs.ref }}
          FALLBACK_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_REF}" ]]; then
            out="${INPUT_REF}"
          else
            out="${FALLBACK_REF}"
          fi
          echo "Resolved checkout ref: ${out}"
          echo "ref=${out}" >> "${GITHUB_OUTPUT}"

      - uses: ./.github/actions/r-cmd-check-shg-r
        with:
          checkout_ref: ${{ steps.pick_checkout_ref.outputs.ref }}
          r_version: release

      - name: Upload Rcheck tests (full testthat output) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rcheck-tests-windows
          if-no-files-found: ignore
          path: |
            **/*.Rcheck/tests/

  R-CMD-check-unix:
    needs: R-CMD-check-windows
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }}${{ inputs.ref && format(' [{0}]', inputs.ref) || format(' ({0})', matrix.config.r) }}

    strategy:
      fail-fast: true
      matrix:
        config:
          - {os: macos-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - id: pick_checkout_ref
        shell: bash
        env:
          INPUT_REF: ${{ inputs.ref }}
          FALLBACK_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_REF}" ]]; then
            out="${INPUT_REF}"
          else
            out="${FALLBACK_REF}"
          fi
          echo "Resolved checkout ref: ${out}"
          echo "ref=${out}" >> "${GITHUB_OUTPUT}"

      - uses: ./.github/actions/r-cmd-check-shg-r
        with:
          checkout_ref: ${{ steps.pick_checkout_ref.outputs.ref }}
          r_version: ${{ matrix.config.r }}

      - name: Upload Rcheck tests (full testthat output) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rcheck-tests-${{ matrix.config.os }}
          if-no-files-found: ignore
          path: |
            **/*.Rcheck/tests/
