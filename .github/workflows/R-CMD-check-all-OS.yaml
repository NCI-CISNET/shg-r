# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Windows runs first; macOS/Ubuntu start only after Windows passes (saves time when Windows fails).
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  workflow_dispatch:
    branches:
      - '**'
  workflow_call:

name: R CMD check all OS

permissions: read-all

jobs:
  R-CMD-check-windows:
    runs-on: windows-latest
    name: windows-latest (release)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          error-on: '"warning"'

      - name: Upload Rcheck tests (full testthat output) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rcheck-tests-windows
          if-no-files-found: ignore
          path: |
            **/*.Rcheck/tests/

  R-CMD-check-unix:
    needs: R-CMD-check-windows
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: true
      matrix:
        config:
          - {os: macos-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          error-on: '"warning"'

      - name: Upload Rcheck tests (full testthat output) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rcheck-tests-${{ matrix.config.os }}
          if-no-files-found: ignore
          path: |
            **/*.Rcheck/tests/
