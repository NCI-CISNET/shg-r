# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Windows runs first; macOS/Ubuntu start only after Windows passes (saves time when Windows fails).
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  workflow_dispatch:
    branches:
      - '**'
    inputs:
      ref:
        description: "Git ref to checkout (branch, tag e.g. v1.2.3, or SHA). Leave empty to use the branch you selected in 'Use workflow from'."
        required: false
        type: string
        default: ""
  push:
    branches:
      - ci/windows-debug
  workflow_call:
    inputs:
      ref:
        description: "Optional ref to checkout; empty uses the triggering ref (e.g. pushed tag)."
        required: false
        type: string
        default: ""

name: R CMD check (all OS)
run-name: R CMD check (all OS) — ${{ inputs.ref != '' && inputs.ref || github.ref_name }}

# Narrow scopes so reusable workflow_call works when the caller uses contents:write (e.g. draft releases).
permissions:
  contents: read
  actions: write

jobs:
  R-CMD-check-windows:
    runs-on: windows-latest
    # When caller passes inputs.ref (e.g. release workflow), show tag in the check name.
    name: windows-latest${{ inputs.ref != '' && format(' [{0}]', inputs.ref) || ' (release)' }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          error-on: '"warning"'

      - name: Upload Rcheck tests (full testthat output) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rcheck-tests-windows
          if-no-files-found: ignore
          path: |
            **/*.Rcheck/tests/

  R-CMD-check-unix:
    needs: R-CMD-check-windows
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }}${{ inputs.ref != '' && format(' [{0}]', inputs.ref) || format(' ({0})', matrix.config.r) }}

    strategy:
      fail-fast: true
      matrix:
        config:
          - {os: macos-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          error-on: '"warning"'

      - name: Upload Rcheck tests (full testthat output) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rcheck-tests-${{ matrix.config.os }}
          if-no-files-found: ignore
          path: |
            **/*.Rcheck/tests/
