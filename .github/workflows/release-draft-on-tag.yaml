# Same idea as shg-cli/.github/workflows/shg-create-release.yml:
# - "Use workflow from" only selects which branch supplies *this workflow file* (e.g. master with CI fixes).
# - The tag you type (manual) or the tag you pushed is what we check out and release — never HEAD of that branch.
# - A tiny job resolves the ref from github.event (dispatch) or github.ref (tag push), checks out that ref to
#   prove it exists, then passes needs.*.outputs.ref into the reusable R CMD check workflow. Mapping
#   workflow_dispatch inputs straight into workflow_call `with` can drop the tag ref so checkout falls back
#   to the branch you picked in the UI.
# When a semver tag vX.Y.Z is pushed, runs R CMD check (all OS) then opens a draft GitHub Release.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (prefix "v", e.g. v6.5.2). A tag with that name must already exist, same as shg-cli create-release.'
        required: true
        type: string

name: Create draft release
# GitHub's Actions run list always shows the branch you picked under "Use workflow from" (github.ref /
# github.ref_name, e.g. master). That is only which copy of this YAML runs — not the checkout ref.
# run-name is the part you control: it includes the tag so the run title matches what you released.
run-name: ${{ format('{0} — draft release (workflow file from {1})', github.event.inputs.version || github.ref_name, github.ref_name) }}

permissions:
  contents: write
  # Reusable R-CMD-check-all-OS.yaml requests actions:write (e.g. check-r-package snapshots).
  actions: write

jobs:
  release-ref:
    runs-on: ubuntu-latest
    outputs:
      # Avoid naming this output "ref" — pass-through into workflow_call has been flaky in practice.
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            REF="$INPUT_VERSION"
          else
            REF="$REF_NAME"
          fi
          if [[ -z "$REF" ]]; then
            echo "Empty release ref" >&2
            exit 1
          fi
          echo "release_tag=$REF" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.release_tag }}
          fetch-depth: 1

  rcmd-check-all-os:
    needs: release-ref
    uses: ./.github/workflows/R-CMD-check-all-OS.yaml
    with:
      ref: ${{ needs.release-ref.outputs.release_tag }}
    secrets: inherit

  draft-release:
    needs: [release-ref, rcmd-check-all-os]
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-ref.outputs.release_tag }}
          name: SmokingHistoryGenerator ${{ needs.release-ref.outputs.release_tag }}
          draft: true
          generate_release_notes: true
