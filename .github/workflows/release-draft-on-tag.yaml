# Same idea as shg-cli/.github/workflows/shg-create-release.yml:
# - "Use workflow from" picks which branch supplies this workflow file (e.g. master with CI fixes).
# - checkout ref is inputs.version || github.ref_name so builds/tests run on the tag commit,
#   not on the workflow branch.
# When a semver tag vX.Y.Z is pushed, runs R CMD check (all OS) then opens a draft GitHub Release.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (prefix "v", e.g. v6.5.2). A tag with that name must already exist, same as shg-cli create-release.'
        required: true
        type: string

name: Create draft release
# Actions UI otherwise labels the run as the workflow branch (e.g. master), not the tag under test.
run-name: Create draft release — ${{ inputs.version || github.ref_name }}

permissions:
  contents: write
  # Reusable R-CMD-check-all-OS.yaml requests actions:write (e.g. check-r-package snapshots).
  actions: write

jobs:
  rcmd-check-all-os:
    uses: ./.github/workflows/R-CMD-check-all-OS.yaml
    with:
      # Same ref for checkout and job-name suffix in R-CMD-check-all-OS (see inputs.ref there).
      ref: ${{ inputs.version || github.ref_name }}
    secrets: inherit

  draft-release:
    needs: rcmd-check-all-os
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          name: SmokingHistoryGenerator ${{ inputs.version || github.ref_name }}
          draft: true
          generate_release_notes: true
