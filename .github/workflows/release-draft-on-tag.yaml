# Same idea as shg-cli/.github/workflows/shg-create-release.yml:
# - "Use workflow from" only selects which branch supplies *this workflow file* (e.g. master with CI fixes).
# - The tag you type (manual) or the tag you pushed is what we check out and release — never HEAD of that branch.
# - R CMD check runs in this workflow via ./.github/actions/r-cmd-check-shg-r (not workflow_call): GitHub does not
#   reliably pass caller `with.ref` into reusable workflows, so checkout could stay on the UI branch.
# When a semver tag vX.Y.Z is pushed, runs R CMD check (all OS) then opens a draft GitHub Release.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (prefix "v", e.g. v6.5.2). A tag with that name must already exist, same as shg-cli create-release.'
        required: true
        type: string

name: Create draft release
# GitHub's Actions run list shows the branch you picked under "Use workflow from"; run-name carries the tag.
run-name: ${{ format('{0} — draft release (workflow file from {1})', github.event.inputs.version || github.ref_name, github.ref_name) }}

permissions:
  contents: write
  actions: write

jobs:
  release-ref:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            REF="$INPUT_VERSION"
          else
            REF="$REF_NAME"
          fi
          if [[ -z "$REF" ]]; then
            echo "Empty release ref" >&2
            exit 1
          fi
          echo "release_tag=$REF" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.release_tag }}
          fetch-depth: 1

  rcmd-check-windows:
    needs: release-ref
    runs-on: windows-latest
    name: windows-latest [${{ needs.release-ref.outputs.release_tag }}]

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      # Local composite is read from disk before any step runs; checkout must exist first (error otherwise:
      # "Did you forget to run actions/checkout before running your local action?").
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: ./.github/actions/r-cmd-check-shg-r
        with:
          checkout_ref: ${{ needs.release-ref.outputs.release_tag }}
          r_version: release

      - name: Upload Rcheck tests (full testthat output) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rcheck-tests-windows
          if-no-files-found: ignore
          path: |
            **/*.Rcheck/tests/

  rcmd-check-unix:
    needs: [release-ref, rcmd-check-windows]
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} [${{ needs.release-ref.outputs.release_tag }}]

    strategy:
      fail-fast: true
      matrix:
        config:
          - {os: macos-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: ./.github/actions/r-cmd-check-shg-r
        with:
          checkout_ref: ${{ needs.release-ref.outputs.release_tag }}
          r_version: ${{ matrix.config.r }}

      - name: Upload Rcheck tests (full testthat output) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rcheck-tests-${{ matrix.config.os }}
          if-no-files-found: ignore
          path: |
            **/*.Rcheck/tests/

  draft-release:
    needs: [release-ref, rcmd-check-windows, rcmd-check-unix]
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-ref.outputs.release_tag }}
          name: SmokingHistoryGenerator ${{ needs.release-ref.outputs.release_tag }}
          draft: true
          generate_release_notes: true
