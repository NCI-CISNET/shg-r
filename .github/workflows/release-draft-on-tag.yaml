# When a semver tag vX.Y.Z is pushed, run full R CMD check (all OS) then open a draft GitHub Release.
#
# Re-runs: GitHub reuses the workflow *at the commit the tag points to* for tag-triggered runs.
# Manual run: under "Use workflow from" pick the branch that contains this workflow (e.g. master).
# R CMD check checks out that branch. Enter the existing semver tag only for the draft release target.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing semver tag for the draft release (e.g. v6.5.2). R CMD check uses the branch selected above."
        required: true
        type: string

name: Create draft release

permissions:
  contents: write
  # Reusable R-CMD-check-all-OS.yaml requests actions:write (e.g. check-r-package snapshots).
  actions: write

jobs:
  rcmd-check-all-os:
    uses: ./.github/workflows/R-CMD-check-all-OS.yaml
    secrets: inherit

  draft-release:
    needs: rcmd-check-all-os
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          name: SmokingHistoryGenerator ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          draft: true
          generate_release_notes: true
