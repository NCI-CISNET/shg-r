# When a semver tag vX.Y.Z is pushed, run full R CMD check (all OS) then open a draft GitHub Release.
#
# Re-runs: GitHub reuses the workflow *at the commit the tag points to* for tag-triggered runs.
# To use an updated workflow (e.g. permissions) while still checking out a release tag, use
# "Run workflow": pick the branch that contains this file under "Use workflow from", then enter
# the semver tag once below (same ref is used for R CMD check and for the draft release).
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: "Semver tag for R CMD check and draft release (e.g. v6.5.2). Workflow file comes from the branch you select above."
        required: true
        type: string

name: Create draft release

permissions:
  contents: write
  # Reusable R-CMD-check-all-OS.yaml requests actions:write (e.g. check-r-package snapshots).
  actions: write

jobs:
  rcmd-check-all-os:
    uses: ./.github/workflows/R-CMD-check-all-OS.yaml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
    secrets: inherit

  draft-release:
    needs: rcmd-check-all-os
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: SmokingHistoryGenerator ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          draft: true
          generate_release_notes: true
