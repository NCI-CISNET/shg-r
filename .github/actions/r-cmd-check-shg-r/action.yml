# Shared steps for R CMD check (shg-r). Used by R-CMD-check-all-OS and release-draft-on-tag
# so the release path never relies on workflow_call input pass-through for the checkout ref.
name: R CMD check (shg-r)
description: Checkout a git ref and run r-lib R CMD check with the same settings as CI.
inputs:
  checkout_ref:
    description: 'Git ref for actions/checkout (branch, tag, or full ref).'
    required: true
  r_version:
    description: 'R version passed to r-lib/actions/setup-r.'
    required: false
    default: 'release'
runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.checkout_ref }}

    - uses: r-lib/actions/setup-pandoc@v2

    - uses: r-lib/actions/setup-r@v2
      with:
        r-version: ${{ inputs.r_version }}
        use-public-rspm: true

    - uses: r-lib/actions/setup-r-dependencies@v2
      with:
        extra-packages: any::rcmdcheck
        needs: check

    - uses: r-lib/actions/check-r-package@v2
      with:
        upload-snapshots: true
        build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
        error-on: '"warning"'
